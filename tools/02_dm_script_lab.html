<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM Script Lab — L'Archipel</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0D0F1A;--bg2:#111827;--card:#161D2E;--blue:#1A6FD4;--bluel:#5BA3FF;--white:#fff;--grey:#C8D5E8;--muted:#8892A4;--border:rgba(90,163,255,0.15);--warn:#f59e0b}
body{background:var(--bg);color:var(--white);font-family:'Poppins',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.hdr{padding:13px 22px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:'Outfit',sans-serif;font-weight:900;font-size:17px;color:var(--bluel);letter-spacing:1px}
.badge{font-size:11px;background:rgba(26,111,212,0.2);border:1px solid var(--border);color:var(--bluel);padding:3px 11px;border-radius:100px}
.layout{display:grid;grid-template-columns:290px 1fr;flex:1}
.left{background:var(--bg2);border-right:1px solid var(--border);padding:18px;overflow-y:auto}
.right{padding:22px;overflow-y:auto}
.sl{font-size:10px;font-weight:700;color:var(--bluel);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;margin-top:18px}
.sl:first-child{margin-top:0}
.obtn{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:9px 12px;cursor:pointer;color:var(--grey);font-family:'Poppins',sans-serif;font-size:12px;text-align:left;transition:all .15s;margin-bottom:6px}
.obtn:hover,.obtn.on{border-color:var(--blue);background:rgba(26,111,212,0.12);color:var(--white)}
.oname{font-weight:700;display:block;font-size:13px}
.osub{font-size:10px;color:var(--muted);margin-top:1px}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.tbtn{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px;cursor:pointer;color:var(--grey);font-family:'Poppins',sans-serif;font-size:12px;text-align:center;transition:all .15s}
.tbtn:hover,.tbtn.on{border-color:var(--blue);background:rgba(26,111,212,0.12);color:var(--white)}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{background:var(--bg);border:1px solid var(--border);border-radius:100px;padding:4px 11px;font-size:11px;cursor:pointer;color:var(--grey);font-family:'Poppins',sans-serif;transition:all .15s}
.chip:hover,.chip.on{background:rgba(26,111,212,0.15);border-color:var(--blue);color:var(--white)}
input,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:8px 12px;color:var(--white);font-family:'Poppins',sans-serif;font-size:12px;outline:none}
input:focus,textarea:focus{border-color:var(--blue)}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{resize:none;line-height:1.5}
.gen{width:100%;margin-top:16px;background:linear-gradient(135deg,var(--blue),var(--bluel));border:none;border-radius:11px;padding:12px;color:var(--white);font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;cursor:pointer}
.gen:disabled{opacity:.5;cursor:not-allowed}
.scard{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px}
.sc-hdr{padding:12px 16px;background:rgba(26,111,212,0.08);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sc-title{font-size:11px;font-weight:700;color:var(--bluel);text-transform:uppercase;letter-spacing:1px}
.cp{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:4px 10px;font-size:11px;color:var(--grey);cursor:pointer;font-family:'Poppins',sans-serif}
.cp.done{border-color:#22c55e;color:#22c55e}
.steps{padding:16px;display:flex;flex-direction:column;gap:12px}
.step{display:flex;gap:12px}
.snum{width:26px;height:26px;border-radius:50%;background:rgba(26,111,212,0.2);border:1px solid var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--bluel);flex-shrink:0;margin-top:1px}
.slab{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:3px}
.smsg{font-size:13px;color:var(--grey);background:var(--bg2);border-radius:7px;padding:9px 12px;border-left:2px solid var(--blue);line-height:1.6;white-space:pre-wrap}
.snote{font-size:10px;color:var(--muted);margin-top:4px;font-style:italic}
.ocard{background:var(--card);border:1px solid rgba(245,158,11,0.2);border-radius:14px;overflow:hidden}
.o-hdr{padding:11px 16px;background:rgba(245,158,11,0.08);border-bottom:1px solid rgba(245,158,11,0.15);font-size:10px;font-weight:700;color:var(--warn);text-transform:uppercase;letter-spacing:1px}
.olist{padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.oq{font-size:13px;color:var(--grey);font-weight:600;margin-bottom:3px}
.oa{font-size:12px;color:var(--muted);padding-left:12px;border-left:2px solid rgba(245,158,11,0.35);line-height:1.55}
.spin{width:32px;height:32px;border:3px solid rgba(90,163,255,0.2);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}


</style>
</head>
<body>
<div class="hdr"><span class="logo">L'ARCHIPEL</span><a href="index.html" style="font-size:11px;color:var(--muted);text-decoration:none;margin-right:12px">← Accueil</a><span class="badge">✍️ DM Script Lab</span></div>
<div id="keyBar" style="display:none;align-items:center;gap:12px;padding:10px 22px;background:#1a0a0a;border-bottom:1px solid rgba(239,68,68,0.3);flex-shrink:0">
  <div style="width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0"></div>
  <span style="font-size:12px;color:#fca5a5">Clé API manquante —</span>
  <a href="index.html" style="font-size:12px;color:#5BA3FF;text-decoration:none;font-weight:600">← Retour à l'accueil pour configurer</a>
</div>

  <span class="api-label">CLÉ API</span>
  <input class="api-inp" id="apiKeyInp" type="password" placeholder="sk-ant-api03-..." autocomplete="off" oninput="onApiInput(this.value)">
  <span class="api-status" id="apiStatus">Non configurée</span>
</div>
<div class="layout">
  <div class="left">
    <div class="sl">Type de contact</div>
    <button class="obtn on" data-c="first" onclick="sel(this,'c')"><span class="oname">👋 Premier contact</span><span class="osub">Jamais parlé avant</span></button>
    <button class="obtn" data-c="warm" onclick="sel(this,'c')"><span class="oname">🔥 Prospect chaud</span><span class="osub">A vu ton contenu</span></button>
    <button class="obtn" data-c="cold" onclick="sel(this,'c')"><span class="oname">🥶 Relance froide</span><span class="osub">A vu sans répondre</span></button>
    <button class="obtn" data-c="objection" onclick="sel(this,'c')"><span class="oname">💸 Objection prix</span><span class="osub">A dit trop cher</span></button>
    <div class="sl">Ton</div>
    <div class="tgrid">
      <button class="tbtn on" data-t="casual" onclick="sel(this,'t')">😎 Relax</button>
      <button class="tbtn" data-t="humour" onclick="sel(this,'t')">😂 Humour</button>
      <button class="tbtn" data-t="urgence" onclick="sel(this,'t')">⚡ Urgence</button>
      <button class="tbtn" data-t="pro" onclick="sel(this,'t')">💼 Pro</button>
    </div>
    <div class="sl">Plan visé</div>
    <div class="chips">
      <button class="chip on" data-pl="Starter 27€" onclick="sel(this,'pl')">Starter</button>
      <button class="chip" data-pl="Premium 97€" onclick="sel(this,'pl')">Premium</button>
      <button class="chip" data-pl="VIP 197€" onclick="sel(this,'pl')">VIP</button>
      <button class="chip" data-pl="auto" onclick="sel(this,'pl')">IA choisit</button>
    </div>
    <div class="sl">Profil</div>
    <input id="age" placeholder="Âge (ex: 16 ans)" style="margin-bottom:7px">
    <textarea id="extra" placeholder="Contexte (ex: vend des presets...)" rows="3"></textarea>
    <button class="gen" id="genbtn" onclick="gen()">⚡ Générer le script</button>
  </div>
  <div class="right" id="out">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:360px;color:var(--muted);text-align:center;gap:10px">
      <div style="font-size:40px">✍️</div>
      <div style="font-family:'Outfit',sans-serif;font-weight:700;font-size:18px;color:var(--grey)">Génère ton script</div>
      <div style="font-size:12px;max-width:240px;line-height:1.6">Configure à gauche. L'IA crée un script DM sur-mesure pour L'Archipel.</div>
    </div>
  </div>
</div>
<script>
// API key managed by bar above
let vals={c:'first',t:'casual',pl:'Starter 27€'};
function sel(btn,key){
  const attr=`data-${key}`;
  btn.closest('.left').querySelectorAll(`[${attr}]`).forEach(x=>x.classList.remove('on'));
  btn.classList.add('on'); vals[key]=btn.dataset[key];
}
async function gen(){
  const age=document.getElementById('age').value;
  const extra=document.getElementById('extra').value;
  const gb=document.getElementById('genbtn');
  gb.disabled=true;gb.textContent='⏳ Génération...';
  document.getElementById('out').innerHTML='<div style="text-align:center;padding:60px;color:var(--muted)"><div class="spin"></div>Génération en cours...</div>';
  const cmap={first:'premier contact jamais parlé',warm:'prospect chaud a vu le contenu',cold:'relance froide a vu sans répondre',objection:"a dit que c'est trop cher"};
  const tmap={casual:'décontracté naturel ado',humour:'humour léger avec émojis',urgence:'urgence et rareté',pro:'professionnel mais jeune'};
  const p=`Expert copywriting DM Instagram. Script de vente pour Thibault (15 ans, @thibault.digit), L'Archipel (Starter 27€, Premium 97€, VIP 197€, Whop). Contact: ${cmap[vals.c]}. Ton: ${tmap[vals.t]}. Plan: ${vals.pl==='auto'?'choisis le plus adapté':vals.pl}. Prospect: ${age||'ado'}. Contexte: ${extra||'aucun'}. DM courts naturels ado français, 4-5 étapes. JSON UNIQUEMENT: {"plan":"Starter 27€","etapes":[{"num":1,"label":"Accroche","msg":"texte exact","conseil":"tip"}],"objections":[{"q":"C'est trop cher","r":"réponse"},{"q":"Y'a des résultats?","r":"..."},{"q":"Pourquoi pas YouTube?","r":"..."}]}`;
  try{
    const r=await apiCall({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:p}]});
    const d=await r.json();
    const res=JSON.parse(d.content[0].text.replace(/```json|```/g,'').trim());
    render(res);
  }catch(e){document.getElementById('out').innerHTML='<div style="color:#ef4444;padding:20px;text-align:center">Erreur. Vérifie que le proxy Vercel est déployé.</div>';}
  gb.disabled=false;gb.textContent='⚡ Générer le script';
}
function render(res){
  let h=`<div class="scard"><div class="sc-hdr"><span class="sc-title">Script · ${esc(res.plan)}</span><button class="cp" onclick="cpAll(this)">Copier tout</button></div><div class="steps">`;
  (res.etapes||[]).forEach(s=>{
    h+=`<div class="step"><div class="snum">${s.num}</div><div style="flex:1"><div class="slab">${esc(s.label)}</div><div class="smsg">${esc(s.msg)}</div>${s.conseil?`<div class="snote">💡 ${esc(s.conseil)}</div>`:''}<button class="cp" style="margin-top:5px" onclick="cpText(this,'${esc(s.msg).replace(/'/g,'')}')">Copier</button></div></div>`;
  });
  h+=`</div></div>`;
  if(res.objections){
    h+=`<div class="ocard"><div class="o-hdr">⚠️ Réponses aux objections</div><div class="olist">`;
    res.objections.forEach(o=>{h+=`<div><div class="oq">❓ ${esc(o.q)}</div><div class="oa">${esc(o.r)}</div></div>`});
    h+=`</div></div>`;
  }
  document.getElementById('out').innerHTML=h;
  window._res=res;
}
function cpAll(btn){if(!window._res)return;const t=window._res.etapes.map((e,i)=>`MSG ${i+1} — ${e.label}:\n${e.msg}`).join('\n\n');navigator.clipboard.writeText(t);flash(btn,'✓ Copié!','Copier tout')}
function cpText(btn,text){navigator.clipboard.writeText(text);flash(btn,'✓ Copié!','Copier')}
function flash(btn,on,off){btn.classList.add('done');btn.textContent=on;setTimeout(()=>{btn.classList.remove('done');btn.textContent=off},2000)}
function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}


// ===== API KEY (shared from index) =====
var _apiKey = localStorage.getItem('archipel_api_key') || '';

function apiCall(body){
  var b = Object.assign({}, body);
  b._apiKey = _apiKey;
  return fetch('https://dashboard-thibault.vercel.app/api/claude', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(b)
  });
}

// Check key on load - show warning if missing
window.addEventListener('DOMContentLoaded', function(){
  _apiKey = localStorage.getItem('archipel_api_key') || '';
  var bar = document.getElementById('keyBar');
  if(bar){
    if(_apiKey){
      bar.style.display = 'none';
    } else {
      bar.style.display = 'flex';
    }
  }
});
// ===== END API KEY =====
</script>
</body>
</html>
