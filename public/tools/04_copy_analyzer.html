<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copy Analyzer — L'Archipel</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0D0F1A;--bg2:#111827;--card:#161D2E;--blue:#1A6FD4;--bluel:#5BA3FF;--white:#fff;--grey:#C8D5E8;--muted:#8892A4;--border:rgba(90,163,255,0.15)}
body{background:var(--bg);color:var(--white);font-family:'Poppins',sans-serif;min-height:100vh}
.hdr{padding:13px 22px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Outfit',sans-serif;font-weight:900;font-size:17px;color:var(--bluel);letter-spacing:1px}
.badge{font-size:11px;background:rgba(26,111,212,0.2);border:1px solid var(--border);color:var(--bluel);padding:3px 11px;border-radius:100px}
.main{max-width:800px;margin:0 auto;padding:24px 18px}
.fcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
.ftitle{font-family:'Outfit',sans-serif;font-weight:900;font-size:22px;margin-bottom:4px}
.fsub{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.6}
.ttabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.ttab{background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:5px 13px;font-size:11px;cursor:pointer;color:var(--grey);font-family:'Poppins',sans-serif;transition:all .15s}
.ttab:hover,.ttab.on{background:rgba(26,111,212,0.15);border-color:var(--blue);color:var(--white)}
textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:11px 14px;color:var(--white);font-family:'Poppins',sans-serif;font-size:13px;outline:none;resize:vertical;line-height:1.6;min-height:120px;box-sizing:border-box;margin-bottom:12px}
textarea:focus{border-color:var(--blue)}
textarea::placeholder{color:var(--muted)}
.abtn{width:100%;background:linear-gradient(135deg,var(--blue),var(--bluel));border:none;border-radius:12px;padding:13px;color:var(--white);font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;cursor:pointer}
.abtn:disabled{opacity:.5;cursor:not-allowed}
.score-row{display:flex;gap:16px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.big-score{font-family:'Outfit',sans-serif;font-weight:900;font-size:64px;line-height:1;min-width:90px;text-align:center}
.bars{flex:1}
.bar-r{margin-bottom:8px}
.bar-lbl{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.bar-lbl span:first-child{color:var(--grey)}
.bar-track{background:var(--bg2);border-radius:100px;height:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:100px;transition:width .6s ease}
.tabs{display:flex;gap:7px;margin-bottom:14px}
.tab{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:7px 14px;font-size:12px;cursor:pointer;color:var(--grey);font-family:'Poppins',sans-serif;transition:all .15s}
.tab:hover,.tab.on{background:rgba(26,111,212,0.15);border-color:var(--blue);color:var(--white)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sec{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.sec-h{padding:11px 16px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.sec-b{padding:14px 16px}
.pt{font-size:13px;color:var(--grey);padding-left:12px;margin-bottom:8px;line-height:1.5}
.ver{font-size:13px;color:var(--grey);line-height:1.8;white-space:pre-wrap;padding:16px}
.ver-foot{padding:11px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);font-style:italic}
.win-item{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.win-num{width:22px;height:22px;border-radius:6px;background:rgba(26,111,212,0.2);border:1px solid var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--bluel);flex-shrink:0}
.cp{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:4px 10px;font-size:11px;color:var(--grey);cursor:pointer;font-family:'Poppins',sans-serif}
.cp.done{border-color:#22c55e;color:#22c55e}
.spin{width:36px;height:36px;border:3px solid rgba(90,163,255,0.2);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}


</style>
</head>
<body>
<div class="hdr"><span class="logo">L'ARCHIPEL</span><a href="index.html" style="font-size:11px;color:var(--muted);text-decoration:none;margin-right:12px">← Accueil</a><span class="badge">🔬 Copy Analyzer</span></div>
<div id="keyBar" style="display:none;align-items:center;gap:12px;padding:10px 22px;background:#1a0a0a;border-bottom:1px solid rgba(239,68,68,0.3);flex-shrink:0">
  <div style="width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0"></div>
  <span style="font-size:12px;color:#fca5a5">Clé API manquante —</span>
  <a href="index.html" style="font-size:12px;color:#5BA3FF;text-decoration:none;font-weight:600">← Retour à l'accueil pour configurer</a>
</div>

  <span class="api-label">CLÉ API</span>
  <input class="api-inp" id="apiKeyInp" type="password" placeholder="sk-ant-api03-..." autocomplete="off" oninput="onApiInput(this.value)">
  <span class="api-status" id="apiStatus">Non configurée</span>
</div>
<div class="main">
  <div class="fcard">
    <div class="ftitle">Analyse ton copywriting</div>
    <div class="fsub">Colle n'importe quel texte. L'IA le note sur 100, identifie les faiblesses et le réécrit en mieux.</div>
    <div class="ttabs" id="ttabs">
      <button class="ttab on" data-t="whop" onclick="selT(this)">📦 Page Whop</button>
      <button class="ttab" data-t="dm" onclick="selT(this)">💬 DM</button>
      <button class="ttab" data-t="bio" onclick="selT(this)">👤 Bio Instagram</button>
      <button class="ttab" data-t="caption" onclick="selT(this)">📸 Caption</button>
      <button class="ttab" data-t="story" onclick="selT(this)">✨ Script Story</button>
    </div>
    <textarea id="txt" placeholder="Colle ton texte ici (page Whop, DM, bio, caption, script story...)"></textarea>
    <button class="abtn" id="abtn" onclick="analyze()">🔬 Analyser et améliorer</button>
  </div>
  <div id="res"></div>
</div>
<script>
// API key managed by bar above
let type='whop', result=null;
function selT(btn){document.querySelectorAll('#ttabs .ttab').forEach(x=>x.classList.remove('on'));btn.classList.add('on');type=btn.dataset.t}
async function analyze(){
  const txt=document.getElementById('txt').value.trim();if(!txt)return;
  const ab=document.getElementById('abtn');ab.disabled=true;ab.textContent='⏳ Analyse en cours...';
  document.getElementById('res').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)"><div class="spin"></div>Analyse du copywriting...</div>';
  const tmap={whop:'page de vente Whop',dm:'message DM Instagram',bio:'bio Instagram',caption:'caption post Instagram',story:'script story Instagram'};
  const p=`Expert copywriting. Analyse ce ${tmap[type]} de Thibault (@thibault.digit, 15 ans, L'Archipel 27€-197€): "${txt.substring(0,800)}". JSON UNIQUEMENT: {"score_global":72,"scores":{"accroche":8,"clarte":7,"urgence":5,"preuve_sociale":6,"cta":8},"points_forts":["point 1","point 2","point 3"],"points_faibles":["pb 1","pb 2","pb 3"],"version_amelioree":"texte réécrit complet optimisé","explication":"pourquoi ces changements en 2 phrases","quick_wins":["amélioration 1","amélioration 2","amélioration 3"]}`;
  try{
    const r=await apiCall({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:p}]});
    const d=await r.json();
    result=JSON.parse(d.content[0].text.replace(/```json|```/g,'').trim());
    renderRes();
  }catch(e){document.getElementById('res').innerHTML='<div style="color:#ef4444;padding:20px;text-align:center">Erreur. Vérifie que le proxy Vercel est déployé.</div>';}
  ab.disabled=false;ab.textContent='🔬 Analyser et améliorer';
}
function renderRes(){
  const r=result;const s=r.score_global;
  const sc=s>=70?'#22c55e':s>=50?'#f59e0b':'#ef4444';
  const bc=(v)=>v>=8?'#22c55e':v>=6?'#5BA3FF':v>=4?'#f59e0b':'#ef4444';
  const sc2=r.scores||{};
  let h=`<div class="score-row"><div class="big-score" style="color:${sc}">${s}</div><div class="bars">`;
  [['Accroche',sc2.accroche||0],['Clarté',sc2.clarte||0],['Urgence',sc2.urgence||0],['Preuve sociale',sc2.preuve_sociale||0],['CTA',sc2.cta||0]].forEach(([l,v])=>{
    h+=`<div class="bar-r"><div class="bar-lbl"><span>${l}</span><span style="color:${bc(v)};font-weight:700">${v}/10</span></div><div class="bar-track"><div class="bar-fill" style="width:${v*10}%;background:${bc(v)}"></div></div></div>`;
  });
  h+=`</div></div>`;
  h+=`<div class="tabs" id="rtabs"><button class="tab on" onclick="sw('analyse',this)">📊 Analyse</button><button class="tab" onclick="sw('version',this)">✨ Version améliorée</button><button class="tab" onclick="sw('wins',this)">⚡ Quick wins</button></div>`;
  h+=`<div id="tab-analyse"><div class="g2">`;
  h+=`<div class="sec" style="border-color:rgba(34,197,94,0.2)"><div class="sec-h" style="color:#22c55e">✅ Points forts</div><div class="sec-b">`;
  (r.points_forts||[]).forEach(p=>{h+=`<div class="pt" style="border-left:2px solid rgba(34,197,94,0.4)">${esc(p)}</div>`});
  h+=`</div></div>`;
  h+=`<div class="sec" style="border-color:rgba(239,68,68,0.2)"><div class="sec-h" style="color:#ef4444">❌ Points faibles</div><div class="sec-b">`;
  (r.points_faibles||[]).forEach(p=>{h+=`<div class="pt" style="border-left:2px solid rgba(239,68,68,0.4)">${esc(p)}</div>`});
  h+=`</div></div></div></div>`;
  const va=esc(r.version_amelioree||'');
  h+=`<div id="tab-version" style="display:none"><div class="sec"><div class="sec-h" style="color:var(--bluel);display:flex;justify-content:space-between;align-items:center"><span>✨ Version optimisée</span><button class="cp" id="cpv">Copier</button></div><div class="ver">${va}</div><div class="ver-foot">💡 ${esc(r.explication||'')}</div></div></div>`;
  h+=`<div id="tab-wins" style="display:none"><div class="sec"><div class="sec-h" style="color:var(--bluel)">⚡ Améliorations rapides</div><div class="sec-b">`;
  (r.quick_wins||[]).forEach((w,i)=>{h+=`<div class="win-item"><div class="win-num">${i+1}</div><div style="font-size:13px;color:var(--grey);line-height:1.5;padding-top:2px">${esc(w)}</div></div>`});
  h+=`</div></div></div>`;
  document.getElementById('res').innerHTML=h;
  document.getElementById('cpv').onclick=()=>{
    navigator.clipboard.writeText(result.version_amelioree||'');
    const btn=document.getElementById('cpv');btn.classList.add('done');btn.textContent='✓ Copié!';
    setTimeout(()=>{btn.classList.remove('done');btn.textContent='Copier'},2000);
  };
}
function sw(name,btn){
  ['analyse','version','wins'].forEach(t=>{const el=document.getElementById('tab-'+t);if(el)el.style.display=t===name?'block':'none'});
  document.querySelectorAll('#rtabs .tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
}
function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}


// ===== API KEY (shared from index) =====
var _apiKey = localStorage.getItem('archipel_api_key') || '';

function apiCall(body){
  var b = Object.assign({}, body);
  b._apiKey = _apiKey;
  return fetch('https://dashboard-thibault.vercel.app/api/claude', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(b)
  });
}

// Check key on load - show warning if missing
window.addEventListener('DOMContentLoaded', function(){
  _apiKey = localStorage.getItem('archipel_api_key') || '';
  var bar = document.getElementById('keyBar');
  if(bar){
    if(_apiKey){
      bar.style.display = 'none';
    } else {
      bar.style.display = 'flex';
    }
  }
});
// ===== END API KEY =====
</script>
</body>
</html>
