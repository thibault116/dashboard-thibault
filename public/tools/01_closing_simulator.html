<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Closing Simulator — L'Archipel</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0D0F1A;--bg2:#111827;--card:#161D2E;--blue:#1A6FD4;--bluel:#5BA3FF;--white:#fff;--grey:#C8D5E8;--muted:#8892A4;--border:rgba(90,163,255,0.15)}
body{background:var(--bg);color:var(--white);font-family:'Poppins',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{padding:14px 22px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:'Outfit',sans-serif;font-weight:900;font-size:18px;color:var(--bluel);letter-spacing:1px}
.badge{font-size:11px;background:rgba(26,111,212,0.2);border:1px solid var(--border);color:var(--bluel);padding:3px 11px;border-radius:100px}
#config{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
#chat{flex:1;display:none;flex-direction:column;overflow:hidden}
#result{flex:1;display:none;align-items:center;justify-content:center;padding:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;max-width:460px;width:100%}
.stitle{font-size:10px;font-weight:700;color:var(--bluel);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:9px;margin-top:18px}
.stitle:first-child{margin-top:0}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pbtn{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;color:var(--grey);font-family:'Poppins',sans-serif;font-size:12px;text-align:left;transition:all .15s}
.pbtn:hover,.pbtn.on{border-color:var(--blue);background:rgba(26,111,212,0.12);color:var(--white)}
.pname{font-weight:700;display:block;font-size:13px;margin-bottom:2px}
.psub{font-size:10px;color:var(--muted)}
.dflex{display:flex;gap:7px}
.dbtn{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:9px 6px;cursor:pointer;color:var(--grey);font-family:'Poppins',sans-serif;font-size:12px;text-align:center;transition:all .15s}
.dbtn:hover,.dbtn.on{border-color:var(--blue);background:rgba(26,111,212,0.12);color:var(--white);font-weight:600}
.startbtn{width:100%;margin-top:22px;background:var(--blue);border:none;border-radius:12px;padding:14px;color:var(--white);font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s}
.startbtn:hover{background:var(--bluel)}
.startbtn:disabled{opacity:.5;cursor:not-allowed}
.chat-top{padding:12px 18px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--bluel));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0}
.pn{font-weight:700;font-size:13px}
.ps{font-size:10px;color:var(--muted)}
.sc{margin-left:auto;font-size:12px;color:var(--bluel);background:rgba(26,111,212,0.15);border:1px solid var(--border);border-radius:100px;padding:3px 12px}
.qbtn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 11px;color:var(--muted);cursor:pointer;font-size:11px;font-family:'Poppins',sans-serif}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(90,163,255,0.2)}
.mw{display:flex;flex-direction:column;max-width:72%}
.mw.me{align-self:flex-end}
.mw.pro{align-self:flex-start}
.mn{font-size:9px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.mw.me .mn{text-align:right}
.bb{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.55}
.mw.pro .bb{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:3px;color:var(--grey)}
.mw.me .bb{background:linear-gradient(135deg,var(--blue),rgba(26,111,212,.75));border-bottom-right-radius:3px}
.fb{background:rgba(91,163,255,0.07);border:1px solid rgba(91,163,255,0.2);border-radius:8px;padding:8px 12px;margin-top:5px;font-size:11px;color:var(--bluel);line-height:1.5}
.fbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;opacity:.65}
.tdots{align-self:flex-start;background:var(--card);border:1px solid var(--border);border-radius:14px;border-bottom-left-radius:3px;padding:12px 16px;display:flex;gap:4px;align-items:center}
.dot{width:5px;height:5px;background:var(--muted);border-radius:50%;animation:boun 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes boun{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.inp{padding:11px 14px;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
textarea{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--white);font-family:'Poppins',sans-serif;font-size:13px;outline:none;resize:none;line-height:1.5;max-height:100px}
textarea:focus{border-color:var(--blue)}
textarea::placeholder{color:var(--muted)}
.sbtn{background:var(--blue);border:none;border-radius:10px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--white);flex-shrink:0}
.sbtn:disabled{opacity:.4;cursor:not-allowed}
.rcrd{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:32px;max-width:420px;width:100%;text-align:center}
.rscore{font-family:'Outfit',sans-serif;font-weight:900;font-size:72px;color:var(--bluel);line-height:1}
.rlabel{font-size:12px;color:var(--muted);margin-bottom:10px}
.rtitle{font-size:20px;font-weight:700;margin-bottom:18px}
.scgrid{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.scpill{background:rgba(26,111,212,0.15);border:1px solid var(--border);border-radius:8px;padding:3px 10px;font-size:11px;color:var(--bluel)}
.restart{width:100%;background:var(--blue);border:none;border-radius:12px;padding:13px;color:var(--white);font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;cursor:pointer}


</style>
</head>
<body>

<div class="hdr">
  <span class="logo">L'ARCHIPEL</span>
  <a href="index.html" style="font-size:11px;color:var(--muted);text-decoration:none;margin-right:12px">← Accueil</a><span class="badge">⚡ Closing Simulator</span>
</div>
<div id="keyBar" style="display:none;align-items:center;gap:12px;padding:10px 22px;background:#1a0a0a;border-bottom:1px solid rgba(239,68,68,0.3);flex-shrink:0">
  <div style="width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0"></div>
  <span style="font-size:12px;color:#fca5a5">Clé API manquante —</span>
  <a href="index.html" style="font-size:12px;color:#5BA3FF;text-decoration:none;font-weight:600">← Retour à l'accueil pour configurer</a>
</div>

  <span class="api-label">CLÉ API</span>
  <input class="api-inp" id="apiKeyInp" type="password" placeholder="sk-ant-api03-..." autocomplete="off" oninput="onApiInput(this.value)">
  <span class="api-status" id="apiStatus">Non configurée</span>
</div>

<div id="config">
  <div class="card">
    <div style="font-family:'Outfit',sans-serif;font-weight:900;font-size:26px;margin-bottom:5px">Entraîne-toi au closing</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.6">L'IA joue un prospect. Tu closes. Feedback coach après chaque message.</div>
    <div class="stitle">Choisis ton prospect</div>
    <div class="pgrid" id="pgrid">
      <button class="pbtn on" data-p="hesitant"><span class="pname">😐 Lucas</span><span class="psub">Intéressé mais hésite</span></button>
      <button class="pbtn" data-p="prix"><span class="pname">💸 Mathis</span><span class="psub">Bloque sur le prix</span></button>
      <button class="pbtn" data-p="froid"><span class="pname">🥶 Enzo</span><span class="psub">Peu réactif, froid</span></button>
      <button class="pbtn" data-p="curieux"><span class="pname">🤔 Théo</span><span class="psub">Questions sans fin</span></button>
    </div>
    <div class="stitle">Difficulté</div>
    <div class="dflex" id="dflex">
      <button class="dbtn on" data-d="easy">Facile</button>
      <button class="dbtn" data-d="medium">Moyen</button>
      <button class="dbtn" data-d="hard">Difficile</button>
    </div>
    <button class="startbtn" id="startBtn">Lancer la simulation →</button>
  </div>
</div>

<div id="chat">
  <div class="chat-top">
    <div class="av" id="cav">L</div>
    <div><div class="pn" id="cname">Lucas</div><div class="ps">Prospect Instagram</div></div>
    <div class="sc" id="scdisp">0/7 · 0/100</div>
    <button class="qbtn" onclick="location.reload()">Quitter</button>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="inp">
    <textarea id="tinp" placeholder="Ton message..." rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
    <button class="sbtn" id="sbtn" onclick="sendMsg()">➤</button>
  </div>
</div>

<div id="result">
  <div class="rcrd">
    <div class="rscore" id="rscore">0</div>
    <div class="rlabel">/ 100</div>
    <div class="rtitle" id="rtitle">—</div>
    <div class="scgrid" id="scgrid"></div>
    <button class="restart" onclick="location.reload()">Recommencer →</button>
  </div>
</div>

<script>
// API directe Anthropic

const PERSONAS = {
  hesitant:{name:'Lucas',init:'L',sys:`Tu joues Lucas, 17 ans, prospect DM Instagram. Il a vu la formation L'Archipel de Thibault (15 ans): marketing digital, Starter 27€, Premium 97€, VIP 197€. Intéressé mais peur de perdre son argent. Pose des questions sur les résultats. Réponds en DM court (2-3 phrases), naturel, style ado français. Ne mentionne jamais que tu es une IA.`},
  prix:{name:'Mathis',init:'M',sys:`Tu joues Mathis, 16 ans, prospect Instagram. Il bloque sur le prix de L'Archipel (Starter 27€, Premium 97€, VIP 197€). Compare avec YouTube gratuit. Réponds en DM court, style ado. Ne mentionne jamais que tu es une IA.`},
  froid:{name:'Enzo',init:'E',sys:`Tu joues Enzo, 18 ans, prospect froid. Peu intéressé, répond "ouais" "mouais" "bof". DM très courts. Ne mentionne jamais que tu es une IA.`},
  curieux:{name:'Théo',init:'T',sys:`Tu joues Théo, 16 ans, très curieux sur L'Archipel de Thibault. Pose plein de questions techniques, a toujours une nouvelle question. DM naturel ado. Ne mentionne jamais que tu es une IA.`}
};

let persona='hesitant', diff='easy', hist=[], scores=[], turn=0, loading=false;
const MAX=7;

document.querySelectorAll('#pgrid .pbtn').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#pgrid .pbtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); persona=b.dataset.p;
});
document.querySelectorAll('#dflex .dbtn').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#dflex .dbtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); diff=b.dataset.d;
});

async function api(messages, system, mt=400) {
  const body = {model:'claude-sonnet-4-20250514', max_tokens:mt, messages};
  if(system) body.system = system;
  const r = await apiCall(body);
  const d = await r.json();
  return d.content?.[0]?.text || '';
}

document.getElementById('startBtn').onclick = async function() {
  this.disabled=true; this.textContent='Chargement...';
  loading=true;
  const p=PERSONAS[persona];
  document.getElementById('cav').textContent=p.init;
  document.getElementById('cname').textContent=p.name;
  document.getElementById('config').style.display='none';
  document.getElementById('chat').style.display='flex';
  const dm={easy:'assez réceptif',medium:'réaliste résistant',hard:'très difficile résistant'}[diff];
  showDots();
  const opening = await api([{role:'user',content:`Démarre comme ${p.name} qui vient de voir L'Archipel sur Instagram. Difficulté: ${dm}. Premier message court, naturel.`}], p.sys);
  hideDots();
  hist=[{role:'user',content:`Démarre.`},{role:'assistant',content:opening}];
  addMsg('pro',p.name,opening);
  loading=false;
};

async function sendMsg() {
  if(loading) return;
  const t=document.getElementById('tinp').value.trim();
  if(!t) return;
  document.getElementById('tinp').value='';
  loading=true; document.getElementById('sbtn').disabled=true;
  addMsg('me','TOI',t); turn++;

  // Feedback
  let fb={force:'Bon effort',ameliore:'Continue',score:6};
  try {
    const fp=`Tu es coach closing. Thibault vend L'Archipel (27€-197€). Son message: "${t}". Prospect: ${persona}, diff: ${diff}. JSON UNIQUEMENT (rien d'autre): {"force":"1 point fort","ameliore":"1 conseil","score":7}`;
    const fr = await api([{role:'user',content:fp}], null, 200);
    fb = JSON.parse(fr.replace(/```json|```/g,'').trim());
  } catch(e){}
  scores.push(fb.score);
  addFeedback(fb); updateScore();

  if(turn>=MAX){ showResult(); return; }

  // Réponse prospect
  showDots();
  const nh=[...hist,{role:'user',content:t}];
  try {
    const rep = await api(nh, PERSONAS[persona].sys);
    hist=[...nh,{role:'assistant',content:rep}];
    hideDots(); addMsg('pro',PERSONAS[persona].name,rep);
  } catch(e){ hideDots(); addMsg('pro',PERSONAS[persona].name,'(erreur réseau)'); }
  loading=false; document.getElementById('sbtn').disabled=false;
}

function addMsg(role,name,text) {
  const w=document.createElement('div'); w.className=`mw ${role}`;
  w.innerHTML=`<div class="mn">${name}</div><div class="bb">${esc(text)}</div>`;
  document.getElementById('msgs').appendChild(w); scrollBot(); return w;
}
function addFeedback(fb) {
  const msgs=document.getElementById('msgs');
  const last=msgs.querySelector('.mw.me:last-child'); if(!last) return;
  const d=document.createElement('div'); d.className='fb';
  d.innerHTML=`<div class="fbl">Coach IA · ${fb.score}/10</div>✅ ${esc(fb.force)}<br>💡 ${esc(fb.ameliore)}`;
  last.appendChild(d);
}
function showDots(){const d=document.createElement('div');d.className='tdots';d.id='tdots';d.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';document.getElementById('msgs').appendChild(d);scrollBot();}
function hideDots(){const d=document.getElementById('tdots');if(d)d.remove();}
function updateScore(){const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*10):0;document.getElementById('scdisp').textContent=`${turn}/${MAX} · ${avg}/100`;}
function showResult(){
  hideDots();
  const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*10):0;
  document.getElementById('chat').style.display='none';
  document.getElementById('result').style.display='flex';
  document.getElementById('rscore').textContent=avg;
  document.getElementById('rtitle').textContent=avg>=80?'🔥 Excellent closer!':avg>=60?'💪 Bon travail':avg>=40?'📈 À améliorer':'🔄 Continue à pratiquer';
  const sg=document.getElementById('scgrid');
  scores.forEach((s,i)=>{const p=document.createElement('div');p.className='scpill';p.textContent=`#${i+1}: ${s*10}/100`;sg.appendChild(p);});
  loading=false;
}
function scrollBot(){const m=document.getElementById('msgs');m.scrollTop=m.scrollHeight;}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}


// ===== API KEY (shared from index) =====
var _apiKey = localStorage.getItem('archipel_api_key') || '';

function apiCall(body){
  var b = Object.assign({}, body);
  return fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': _apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify(b)
  });
}

// Check key on load - show warning if missing
window.addEventListener('DOMContentLoaded', function(){
  _apiKey = localStorage.getItem('archipel_api_key') || '';
  var bar = document.getElementById('keyBar');
  if(bar){
    if(_apiKey){
      bar.style.display = 'none';
    } else {
      bar.style.display = 'flex';
    }
  }
});
// ===== END API KEY =====
</script>
</body>
</html>
